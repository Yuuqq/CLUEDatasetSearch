name: Update DATASETS.md

on:
  push:
    paths:
      - 'data/**'
      - 'scripts/generate_datasets_md.py'
    branches: [ master, main ]
  workflow_dispatch:   # Allow manual trigger

jobs:
  update-datasets-md:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Generate DATASETS.md
        run: |
          python scripts/generate_datasets_md.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet DATASETS.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DATASETS.md
          git commit -m "chore: auto-update DATASETS.md from data/ JSON files"
          git push